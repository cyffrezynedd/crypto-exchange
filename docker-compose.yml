name: crypto-exchange

services:
  consul:
    image: hashicorp/consul:1.18
    container_name: crypto_exchange_consul
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -bind=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: crypto_exchange_db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/migrations:ro
      - ./devtools/db:/devtools/db:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crypto_exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    image: postgres:16-alpine
    container_name: crypto_exchange_migrate
    environment:
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./devtools/db:/devtools/db:ro
    command: ["sh", "/devtools/db/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: crypto_exchange_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: crypto_exchange_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  iam-service:
    build:
      context: ./backend
      dockerfile: iam-service/Dockerfile
    container_name: crypto_exchange_iam
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-exchange-jwt-secret-key-32chars}
      CONSUL_HOST: consul
    depends_on:
      consul:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  clearing-service:
    build:
      context: ./backend
      dockerfile: clearing-service/Dockerfile
    container_name: crypto_exchange_clearing
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONSUL_HOST: consul
    depends_on:
      consul:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  trading-service:
    build:
      context: ./backend
      dockerfile: trading-service/Dockerfile
    container_name: crypto_exchange_trading
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CLEARING_SERVICE_URI: http://clearing-service:8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONSUL_HOST: consul
    depends_on:
      consul:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      clearing-service:
        condition: service_started
      kafka:
        condition: service_healthy

  market-data-service:
    build:
      context: ./backend
      dockerfile: market-data-service/Dockerfile
    container_name: crypto_exchange_market
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      CONSUL_HOST: consul
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: crypto_exchange_gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-exchange-jwt-secret-key-32chars}
      GATEWAY_CONSUL_ENABLED: "true"
      CONSUL_HOST: consul
      IAM_SERVICE_URI: http://iam-service:8081
      CLEARING_SERVICE_URI: http://clearing-service:8082
      TRADING_SERVICE_URI: http://trading-service:8083
      MARKET_DATA_SERVICE_URI: http://market-data-service:8084
    depends_on:
      consul:
        condition: service_healthy
      iam-service:
        condition: service_started
      clearing-service:
        condition: service_started
      trading-service:
        condition: service_started
      market-data-service:
        condition: service_started

volumes:
  pgdata:
