name: crypto-exchange

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto_exchange_db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/migrations:ro
      - ./devtools/jdbc:/devtools/jdbc:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crypto_exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
