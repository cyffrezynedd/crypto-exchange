spring:
  cloud:
    consul:
      host: consul
      discovery:
        enabled: true
        register: true
  datasource:
    url: jdbc:postgresql://postgres:5432/crypto_exchange
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

management:
  health:
    consul:
      enabled: false
    discovery:
      enabled: false
