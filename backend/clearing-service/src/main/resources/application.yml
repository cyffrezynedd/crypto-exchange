server:
  port: 8082

spring:
  application:
    name: clearing-service
  datasource:
    url: jdbc:postgresql://localhost:5433/crypto_exchange
    username: postgres
    password: postgres
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: clearing
        jdbc:
          time_zone: UTC
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: ${CONSUL_DISCOVERY_ENABLED:false}
        register: ${CONSUL_DISCOVERY_ENABLED:false}
        prefer-ip-address: true
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    consul:
      enabled: false
    discovery:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  paths-to-exclude: /internal/**
  show-actuator: false

clearing:
  platform-user-id: 0
  default-fee-rate: 0.001
  treasury-initial-balance: 1000000000
  features:
    deposit-enabled: false
  internal-api:
    key: ${INTERNAL_API_KEY:dev-internal-api-key}

exchange:
  gateway-trust:
    enabled: false
    secret: ${GATEWAY_INTERNAL_SECRET:}
