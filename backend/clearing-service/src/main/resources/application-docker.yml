spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/crypto_exchange
  cloud:
    consul:
      host: consul
      discovery:
        enabled: true
        register: true

clearing:
  features:
    deposit-enabled: true

exchange:
  gateway-trust:
    enabled: true
    secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

management:
  health:
    consul:
      enabled: false
    discovery:
      enabled: false
