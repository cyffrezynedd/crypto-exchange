spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/crypto_exchange
  cloud:
    consul:
      host: consul
      discovery:
        enabled: true
        register: true
  kafka:
    bootstrap-servers: kafka:9092

clearing:
  service:
    base-url: http://clearing-service:8082
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-api-key}

exchange:
  gateway-trust:
    enabled: true
    secret: ${GATEWAY_INTERNAL_SECRET:dev-gateway-internal-secret}

management:
  health:
    consul:
      enabled: false
    discovery:
      enabled: false
