server:
  port: 8083

spring:
  application:
    name: trading-service
  datasource:
    url: jdbc:postgresql://localhost:5433/crypto_exchange
    username: postgres
    password: postgres
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: trading
        jdbc:
          time_zone: UTC
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: ${CONSUL_DISCOVERY_ENABLED:false}
        register: ${CONSUL_DISCOVERY_ENABLED:false}
        prefer-ip-address: true
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${server.port}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

clearing:
  service:
    base-url: http://localhost:8082
    internal-api-key: ${INTERNAL_API_KEY:}

trading:
  outbox:
    topic: exchange.domain.events
    batch-size: 100
    max-retries: 10

exchange:
  gateway-trust:
    enabled: false
    secret: ${GATEWAY_INTERNAL_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    consul:
      enabled: false
    discovery:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  paths-to-exclude: /internal/**
  show-actuator: false
