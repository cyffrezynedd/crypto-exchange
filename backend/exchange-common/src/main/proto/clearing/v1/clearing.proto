syntax = "proto3";

package exchange.clearing.v1;

option java_multiple_files = true;
option java_package = "com.exchange.common.grpc.clearing.v1";

service ClearingService {
  rpc CheckBalance(CheckBalanceRequest) returns (CheckBalanceResponse);
  rpc FreezeFunds(FreezeFundsRequest) returns (FreezeFundsResponse);
  rpc UnfreezeFunds(UnfreezeFundsRequest) returns (UnfreezeFundsResponse);
}

message MoneyAmount {
  string amount = 1;
}

message CheckBalanceRequest {
  int64 user_id = 1;
  int64 currency_id = 2;
  MoneyAmount required_amount = 3;
}

message CheckBalanceResponse {
  bool sufficient = 1;
  MoneyAmount available_balance = 2;
}

message FreezeFundsRequest {
  string idempotency_key = 1;
  int64 user_id = 2;
  int64 currency_id = 3;
  MoneyAmount amount = 4;
  string reason = 5;
}

message FreezeFundsResponse {
  bool success = 1;
  int64 wallet_id = 2;
  MoneyAmount locked_balance = 3;
}

message UnfreezeFundsRequest {
  string idempotency_key = 1;
  int64 user_id = 2;
  int64 currency_id = 3;
  MoneyAmount amount = 4;
  string reason = 5;
}

message UnfreezeFundsResponse {
  bool success = 1;
  MoneyAmount available_balance = 2;
}
